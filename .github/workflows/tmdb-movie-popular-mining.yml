name: TMDb Film Popular Mining

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages to fetch"
        required: false
        default: "5"
      limit:
        description: "Max records to process over all pages"
        required: false
        default: "0"

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Mining Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          PAGES: ${{ github.event.inputs.max_pages || '5' }}
          ENDPOINT: '/movie/popular'
          CI: "true"
        run: npx ts-node src/tmdb-media-mining.ts
