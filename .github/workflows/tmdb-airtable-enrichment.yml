name: TMDb Airtable Enrichment

on:
  schedule:
    # Run daily at 4 AM UTC (after the Supabase one)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      record_limit:
        description: "Number of records to process (leave empty for all)"
        required: false
        default: ""
        type: string

jobs:
  enrich-airtable:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run TMDb Airtable Enrichment
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: ${{ secrets.AIRTABLE_TABLE_ID }}
          AIRTABLE_VIEW_NAME: "To Process"
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
        run: |
          if [ -z "${{ github.event.inputs.record_limit }}" ]; then
            python scripts/tmdb_airtable_enrichment.py --all
          else
            python scripts/tmdb_airtable_enrichment.py --limit ${{ github.event.inputs.record_limit }}
          fi

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ TMDb Airtable Enrichment completed successfully"
          else
            echo "❌ TMDb Airtable Enrichment failed"
          fi
