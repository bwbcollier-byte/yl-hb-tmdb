name: TMDb Social Profile Enrichment

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      record_limit:
        description: "Number of records to process (leave empty for all)"
        required: false
        default: ""
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Run TMDb Social Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          LIMIT: ${{ github.event.inputs.record_limit }}
          CI: "true"
        run: node dist/tmdb-social-enrichment.js

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ TMDb Social Enrichment completed successfully"
          else
            echo "❌ TMDb Social Enrichment failed"
          fi
