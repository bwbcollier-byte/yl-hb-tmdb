name: TMDb Social Profile Enrichment

on:
  schedule:
    # Run daily at 3 AM UTC — after popular talent mining (2 AM)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max profiles to enrich (default: 1000)"
        required: false
        default: "1000"
        type: string

concurrency:
  group: tmdb-social-profile-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Notify Supabase — start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"p_workflow_id": 242473770, "p_status": "running", "p_run_id": "${{ github.run_id }}"  }'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TMDb Social Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          LIMIT: ${{ github.event.inputs.limit || '1000' }}
          WORKFLOW_ID: '242473770'
        run: npx ts-node --transpile-only src/tmdb-social-enrichment.ts

      - name: Notify Supabase — result
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))
          STATUS="${{ job.status }}"
          PAYLOAD=$(printf '{"p_workflow_id": 242473770, "p_status": "%s", "p_duration_secs": %s, "p_run_id": "${{ github.run_id }}"}' "$STATUS" "$DURATION")
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
