name: TMDb Popular Talent Mining

on:
  schedule:
    # Run daily at 2 AM UTC — after trending (1 AM), before social enrichment (3 AM)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Number of popular pages to fetch (20 people per page, default 10)"
        required: false
        default: "10"
        type: string

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Run TMDb Popular Talent Mining
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '10' }}
          CI: "true"
        run: node dist/tmdb-popular-mining.js

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ TMDb Popular Talent Mining completed successfully"
          else
            echo "❌ TMDb Popular Talent Mining failed"
          fi
