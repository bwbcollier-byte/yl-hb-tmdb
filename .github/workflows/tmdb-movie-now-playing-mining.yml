name: TMDb Film Now Playing Mining

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages to fetch (default: 1)"
        required: false
        default: "1"

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Supabase — start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"p_workflow_id": 242622476, "p_status": "running", "p_run_id": "${{ github.run_id }}"  }'
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Mining Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '1' }}
        run: npx ts-node src/tmdb-now-playing-mining.ts
      - name: Notify Supabase — result
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))
          STATUS="${{ job.status }}"
          PAYLOAD=$(printf '{"p_workflow_id": 242622476, "p_status": "%s", "p_duration_secs": %s, "p_run_id": "${{ github.run_id }}"}' "$STATUS" "$DURATION")
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
