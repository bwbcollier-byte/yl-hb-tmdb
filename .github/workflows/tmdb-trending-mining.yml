name: TMDb Trending Talent Mining

on:
  schedule:
    # Run daily at 1 AM UTC — picks up the latest trending people each day
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Pages to fetch (20 people/page, default: 3)"
        required: false
        default: "3"
        type: string

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Notify Supabase — start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"p_workflow_id": 242603008, "p_status": "running", "p_run_id": "${{ github.run_id }}"  }'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TMDb Trending Talent Mining
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '3' }}
          WORKFLOW_ID: '242603008'
        run: npx ts-node --transpile-only src/tmdb-trending-mining.ts

      - name: Notify Supabase — result
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))
          STATUS="${{ job.status }}"
          PAYLOAD=$(printf '{"p_workflow_id": 242603008, "p_status": "%s", "p_duration_secs": %s, "p_run_id": "${{ github.run_id }}"}' "$STATUS" "$DURATION")
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
